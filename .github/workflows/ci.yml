name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  discovery-smoke:
    runs-on: ubuntu-latest
    needs: web-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Discovery against production
        run: |
          npx -y @agentcash/discovery@latest discover "https://etch.ack-onchain.dev" | tee /tmp/discovery.txt
          grep -q "POST    /api/v1/notarize  paid" /tmp/discovery.txt
